<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Commodity Dashboard</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#0b1f3b;
  color:white;
}

.header{
  text-align:center;
  padding:20px;
  background:#0f2a4d;
}

.status{
  text-align:center;
  padding:10px;
  background:#061a33;
  font-size:14px;
}

.container{
  padding:20px;
}

.cards{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.card{
  flex:1;
  min-width:200px;
  background:white;
  color:black;
  padding:15px;
  border-radius:10px;
}

.table-box{
  margin-top:20px;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  border-bottom:1px solid #ddd;
}
</style>

</head>

<body>

<div class="header">
  <h1>📊 Live Commodity Dashboard</h1>
  <p>Real-time prices from Google Sheets</p>
</div>

<div class="status">
  🟢 Live System | Auto Refresh: 30s | <span id="time"></span>
</div>

<div class="container">

  <div class="cards">
    <div class="card">
      <h3>Highest Price</h3>
      <p id="high">Loading...</p>
    </div>

    <div class="card">
      <h3>Lowest Price</h3>
      <p id="low">Loading...</p>
    </div>

    <div class="card">
      <h3>Average Price</h3>
      <p id="avg">Loading...</p>
    </div>
  </div>

  <div class="table-box">
    <h3>Live Commodity Table</h3>

    <table id="table">
      <thead>
        <tr>
          <th>Commodity</th>
          <th>Price</th>
          <th>Unit</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycby7hYYpP5xnNqty86-ClT2K3YVBKyXJovkarnP2WDA_/exec";

async function loadData(){
  try{
    const res = await fetch(API_URL);
    const data = await res.json();

    let table = document.querySelector("#table tbody");
    table.innerHTML = "";

    let prices = [];

    data.forEach(row => {
      let tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${row.Commodity}</td>
        <td>${row.Price}</td>
        <td>${row.Unit || ""}</td>
      `;

      table.appendChild(tr);

      if(!isNaN(row.Price)) prices.push(Number(row.Price));
    });

    if(prices.length){
      document.getElementById("high").innerText = Math.max(...prices);
      document.getElementById("low").innerText = Math.min(...prices);
      document.getElementById("avg").innerText =
        (prices.reduce((a,b)=>a+b,0)/prices.length).toFixed(2);
    }

  }catch(err){
    console.log(err);
  }
}

function updateTime(){
  document.getElementById("time").innerText = new Date().toLocaleString();
}

loadData();
updateTime();

setInterval(loadData,30000);
setInterval(updateTime,1000);

</script>

</body>
</html>
