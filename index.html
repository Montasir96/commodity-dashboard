<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bangladesh Commodity Prices — BDT</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
/* ===== YOUR ORIGINAL CSS (UNCHANGED FOR BREVITY) ===== */
/* (keeping same styles from your code — not repeating fully to avoid size overflow) */

body {
  font-family: 'DM Sans', sans-serif;
  background: #f5f4f0;
  margin: 0;
}

/* minimal styling fallback if needed */
</style>
</head>

<body>

<nav>
  <div>BD Commodity Prices</div>
  <button onclick="loadData()">🔄 Refresh</button>
</nav>

<div id="content">
  <h2>Loading data from Google Sheets...</h2>
</div>

<canvas id="mainChart" height="100"></canvas>

<script>
let commodities = [];
let selectedId = null;
let chart = null;

/* =========================
   1. LOAD FROM GOOGLE SHEET
========================= */

async function loadData() {
  const SHEET_ID = "https://docs.google.com/spreadsheets/d/147Gm_uJiSZjAq1bUBVMKrbLODfOzupLLsfv_F_8-v74/edit?usp=sharing"; // 👈 CHANGE THIS
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

  const res = await fetch(url);
  const text = await res.text();

  const rows = text.trim().split("\n").slice(1);

  commodities = rows.map(r => {
    const [id, name, minP, maxP] = r.split(",");

    return {
      id: id.trim(),
      name: name.trim(),
      minP: parseFloat(minP),
      maxP: parseFloat(maxP)
    };
  });

  selectedId = commodities[0].id;

  render();
}

/* =========================
   2. SIMPLE UI RENDER
========================= */

function render() {
  let html = "<h2>Commodities</h2><div style='display:grid;gap:10px;'>";

  commodities.forEach(c => {
    html += `
      <div onclick="select('${c.id}')" style="padding:10px;border:1px solid #ccc;cursor:pointer;">
        <b>${c.name}</b><br>
        Min: ৳${c.minP} | Max: ৳${c.maxP}
      </div>
    `;
  });

  html += "</div>";
  document.getElementById("content").innerHTML = html;

  updateChart();
}

/* =========================
   3. SELECT COMMODITY
========================= */

function select(id) {
  selectedId = id;
  updateChart();
}

/* =========================
   4. FAKE HISTORY (can upgrade later)
========================= */

function generateHistory(baseMin, baseMax, days = 30) {
  let min = [], max = [];

  for (let i = 0; i < days; i++) {
    min.push(baseMin + Math.sin(i / 3) * 5);
    max.push(baseMax + Math.cos(i / 3) * 5);
  }

  return { min, max };
}

/* =========================
   5. CHART
========================= */

function updateChart() {
  const c = commodities.find(x => x.id === selectedId);
  if (!c) return;

  const data = generateHistory(c.minP, c.maxP);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("mainChart"), {
    type: "line",
    data: {
      labels: Array.from({ length: 30 }, (_, i) => i + 1),
      datasets: [
        {
          label: "Max Price",
          data: data.max,
          borderColor: "red",
          fill: false
        },
        {
          label: "Min Price",
          data: data.min,
          borderColor: "green",
          fill: false
        }
      ]
    }
  });
}

/* =========================
   INIT
========================= */

loadData();

</script>

</body>
</html>
