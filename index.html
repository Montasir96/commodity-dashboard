<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Commodity Dashboard</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#0b1f3b;
  color:white;
}
.header{
  padding:20px;
  text-align:center;
  background:#0f2a4d;
}
.status{
  text-align:center;
  padding:10px;
  background:#06203a;
  font-size:14px;
}
.container{
  padding:20px;
}
.cards{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.card{
  flex:1;
  min-width:200px;
  background:white;
  color:black;
  padding:15px;
  border-radius:10px;
}
.table-container{
  margin-top:20px;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  overflow-x:auto;
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  border-bottom:1px solid #ddd;
  padding:8px;
  text-align:left;
}
.refresh{
  font-size:12px;
  color:#ccc;
}
</style>
</head>

<body>

<div class="header">
  <h1>📊 Live Commodity Dashboard</h1>
  <p>Real-time prices from Google Sheets</p>
</div>

<div class="status">
  🟢 Live System | Auto Refresh Every 30 Seconds | <span id="time"></span>
</div>

<div class="container">

  <div class="cards">
    <div class="card">
      <h3>Highest Price</h3>
      <p id="high">Loading...</p>
    </div>
    <div class="card">
      <h3>Lowest Price</h3>
      <p id="low">Loading...</p>
    </div>
    <div class="card">
      <h3>Average Price</h3>
      <p id="avg">Loading...</p>
    </div>
  </div>

  <div class="table-container">
    <h3>Live Commodity Table</h3>
    <p class="refresh">Auto-updating from Google Sheets API</p>
    <table id="dataTable">
      <thead>
        <tr>
          <th>Commodity</th>
          <th>Price</th>
          <th>Unit</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script>

// 🔥 PUT YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
const API_URL = "https://script.google.com/macros/s/AKfycbwNKOOSnVta1is57o0CtsD0LqVoPw3RsJCmQJPKKrOHEPbNP9zp9hwD1IfM5iVLh81Q7g/exec";

async function fetchData(){
  try{
    const res = await fetch(API_URL);
    const data = await res.json();

    let table = document.querySelector("#dataTable tbody");
    table.innerHTML = "";

    let prices = [];

    data.forEach(row => {
      let tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${row.Commodity}</td>
        <td>${row.Price}</td>
        <td>${row.Unit || ''}</td>
      `;
      table.appendChild(tr);

      if(!isNaN(row.Price)) prices.push(Number(row.Price));
    });

    // stats
    if(prices.length){
      document.getElementById("high").innerText = Math.max(...prices);
      document.getElementById("low").innerText = Math.min(...prices);
      document.getElementById("avg").innerText = 
        (prices.reduce((a,b)=>a+b,0)/prices.length).toFixed(2);
    }

  }catch(e){
    console.log(e);
  }
}

function updateTime(){
  document.getElementById("time").innerText = new Date().toLocaleString();
}

fetchData();
updateTime();

setInterval(fetchData,30000); // 30 sec refresh
setInterval(updateTime,1000);

</script>

</body>
</html>
