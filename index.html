<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commodity Dashboard</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b1f3b;
  color:white;
  -webkit-overflow-scrolling: touch;
  overflow-x:hidden;
}

/* HEADER */
.header{
  text-align:center;
  padding:18px;
  background:#0f2a4d;
}

.header h1{
  margin:0;
  font-size:20px;
}

/* STATUS BAR */
.status{
  text-align:center;
  font-size:12px;
  padding:8px;
  background:#061a33;
}

/* CONTAINER */
.container{
  padding:12px;
}

/* TABLE CARD */
.card{
  background:white;
  color:black;
  border-radius:10px;
  overflow:hidden;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  font-size:14px;
}

th{
  background:#f3f3f3;
}

/* MOBILE FIX */
.table-wrap{
  overflow-x:auto;
  -webkit-overflow-scrolling: touch;
}

/* LOADING */
.loading{
  text-align:center;
  padding:20px;
  color:#888;
}
</style>
</head>

<body>

<div class="header">
  <h1>📊 Commodity Dashboard</h1>
</div>

<div class="status">
  🟢 Live Data | Auto Refresh 30s
</div>

<div class="container">

  <div class="card">

    <div class="table-wrap">
      <table id="tbl">
        <thead>
          <tr>
            <th>পণ্য</th>
            <th>সর্বনিম্ন</th>
            <th>সর্বোচ্চ</th>
            <th>আপডেট</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="4" class="loading">Loading data...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycby7hYYpP5xnNqty86-ClT2K3YVBKyXJovkarnP2WDA_/exec";

async function loadData(){
  try{

    const res = await fetch(API_URL);
    const data = await res.json();

    let tbody = document.querySelector("#tbl tbody");
    tbody.innerHTML = "";

    data.forEach(row => {

      if(!row["পণ্য"]) return;

      let tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${row["পণ্য"]}</td>
        <td>${row["সর্বনিম্ন মূল্য (টাকা)"] || "-"}</td>
        <td>${row["সর্বোচ্চ মূল্য (টাকা)"] || "-"}</td>
        <td>${row["সর্বশেষ আপডেট"] || "-"}</td>
      `;

      tbody.appendChild(tr);
    });

  }catch(err){
    console.log("Error:", err);
  }
}

loadData();
setInterval(loadData,30000);

</script>

</body>
</html>
